name: CI/CD Pipeline - GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version comes from package.json "packageManager" (single source of
          # truth). Specifying it here too triggers ERR_PNPM_BAD_PM_VERSION.
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm biome check src/

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build (catches runtime errors before we push an image)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  build-and-deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest
    needs: test
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}"
          service_account: "${{ vars.GCP_SERVICE_ACCOUNT_NAME }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_LOCATION }}-docker.pkg.dev

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push image
        run: |
          IMAGE=${{ vars.GCP_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPOSITORY }}/${{ vars.GCP_APP_NAME }}

          docker build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t ${IMAGE}:${SHORT_SHA} \
            -t ${IMAGE}:latest \
            .

          docker push ${IMAGE}:${SHORT_SHA}
          # Only main owns the :latest tag; branch/manual builds don't move it.
          if [ "${{ github.event_name }}" = "push" ]; then
            docker push ${IMAGE}:latest
          fi

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ vars.GCP_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPOSITORY }}/${{ vars.GCP_APP_NAME }}

          # Pushes to main take live traffic. Manual runs (workflow_dispatch,
          # from any branch) deploy a no-traffic "preview" revision with its own
          # URL, so you can test a branch without touching production.
          if [ "${{ github.event_name }}" = "push" ]; then
            TRAFFIC_FLAGS=""
          else
            TRAFFIC_FLAGS="--tag=preview --no-traffic"
          fi

          gcloud run deploy ${{ vars.GCP_APP_NAME }} \
            --image=${IMAGE}:${SHORT_SHA} \
            --region=${{ vars.GCP_LOCATION }} \
            --platform=managed \
            --port=3000 \
            --service-account=${{ vars.GCP_SERVICE_ACCOUNT_NAME }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars=STORE_TYPE=firestore,X402_STELLAR_NETWORK=stellar:testnet,TIPJAR_CONTRACT_ID=${{ vars.TIPJAR_CONTRACT_ID }},PATRONAGE_CONTRACT_ID=${{ vars.PATRONAGE_CONTRACT_ID }},NEXT_TELEMETRY_DISABLED=1 \
            --set-secrets=TEST_MNEMONIC=TEST_MNEMONIC:latest \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60s \
            $TRAFFIC_FLAGS

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Preview revision deployed with NO traffic. Tagged URLs:"
            gcloud run services describe ${{ vars.GCP_APP_NAME }} \
              --region=${{ vars.GCP_LOCATION }} \
              --format='table(status.traffic.tag, status.traffic.url)'
          fi